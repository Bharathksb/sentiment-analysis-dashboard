spring.application.name=sentiment-dashboard

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sentiment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Port
server.port=8080

# JWT Secret
jwt.secret=sentimentDashboardSecretKey2024chars
jwt.expiration=86400000




server.error.include-message=always
server.error.include-binding-errors=always
logging.level.org.springframework.security=DEBUG